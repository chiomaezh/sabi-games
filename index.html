<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>SABI Play</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #FAFBE3;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .lockup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 43px;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards;
    }

    .lockup img {
      display: block;
    }

    .lockup a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 43px;
      text-decoration: none;
    }

    .logo {
      max-width: 220px;
      height: auto;
    }

    .play-mark {
      height: 52px;
      width: auto;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="lockup">
    <a href="https://play.sabi.london/word-search/" aria-label="SABI Play - Word Search">
      <img class="logo" src="sabi-logo.png" alt="SABI">
      <img class="play-mark" src="favicon-play.png" alt="Play">
    </a>
  </div>
</body>
</html>
